<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü — Boğaz Restaurant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── CUSTOM PROPERTIES ──────────────────────────────────── */
    :root {
      --gold:        #c9a84c;
      --black:       #080501;
      --cream:       #f5f0e8;
      --gold-dim:    rgba(201,168,76,0.18);
      --gold-mid:    rgba(201,168,76,0.55);
      --font-head: 'Cormorant Garamond', 'Georgia', serif;
      --font-body: 'Jost', 'Helvetica Neue', sans-serif;
      --ease:     cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --wrap: 1160px;
    }

    /* ── RESET ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--cream);
      font-family: var(--font-body);
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; max-width: 100%; }
    a   { text-decoration: none; color: inherit; }

    /* ── SCROLLBAR ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

    /* ── HEADER ─────────────────────────────────────────────── */
    .site-header {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 3rem;
      background: rgba(8,5,1,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(201,168,76,0.12);
    }

    .header__brand {
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--gold);
    }

    .header__back {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.5);
      transition: color 0.3s var(--ease);
    }
    .header__back svg { transition: transform 0.3s var(--ease); }
    .header__back:hover { color: var(--gold); }
    .header__back:hover svg { transform: translateX(-3px); }

    /* ── HERO BANNER ─────────────────────────────────────────── */
    .menu-hero {
      padding-top: 120px;
      padding-bottom: 4rem;
      background: linear-gradient(180deg, #0c0906 0%, #080501 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .menu-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .menu-hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.4rem;
    }
    .menu-hero__eyebrow::before,
    .menu-hero__eyebrow::after {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: var(--gold-mid);
    }

    .menu-hero__title {
      font-family: var(--font-head);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: var(--cream);
      margin-bottom: 1.6rem;
    }

    .menu-hero__rule {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto;
    }

    /* ── STICKY TABS ─────────────────────────────────────────── */
    .tabs-wrap {
      position: sticky;
      top: 64px;
      z-index: 200;
      background: #080501;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .tabs-wrap::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 4rem;
      background: linear-gradient(to right, transparent, #080501);
      pointer-events: none;
    }

    .tabs-inner {
      max-width: var(--wrap);
      margin: 0 auto;
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 0 2rem;
    }
    .tabs-inner::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 1.1rem 1.6rem;
      font-family: var(--font-body);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
      background: transparent;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.3s, border-color 0.3s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--cream); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* ── PANELS ──────────────────────────────────────────────── */
    .panels-wrap {
      max-width: var(--wrap);
      margin: 0 auto;
      padding: 3.5rem 2rem 6rem;
    }

    .menu-panel.hidden { display: none; }

    /* ── ITEM ROWS ───────────────────────────────────────────── */
    .item-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.4rem 1.2rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(201,168,76,0.1);
      border-left: 3px solid transparent;
      transition: background 0.3s var(--ease), border-left-color 0.3s var(--ease), padding-left 0.3s var(--ease);
    }
    .item-row:first-child { border-top: 1px solid rgba(201,168,76,0.1); }
    .item-row:hover {
      background: rgba(201,168,76,0.04);
      border-left-color: var(--gold);
      padding-left: 1.8rem;
    }

    .item-row__info {
      flex: 1;
      min-width: 0;
    }

    .item-row__name {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      color: var(--cream);
      margin-bottom: 0.3rem;
    }

    .item-row__desc {
      font-size: 0.78rem;
      font-weight: 300;
      line-height: 1.6;
      color: rgba(245,240,232,0.42);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-row__right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .item-row__img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 2px;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    .item-row:hover .item-row__img { opacity: 1; }

    .item-row__price {
      font-family: var(--font-head);
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.03em;
    }

    /* ── MODAL ───────────────────────────────────────────────── */
    .item-modal {
      position: fixed;
      inset: 0;
      z-index: 800;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s var(--ease);
    }
    .item-modal.open { opacity: 1; pointer-events: auto; }

    .item-modal__inner {
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      background: #100d08;
      border: 1px solid rgba(201,168,76,0.2);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(40px);
      transition: transform 0.45s var(--ease-out);
    }
    .item-modal.open .item-modal__inner { transform: translateY(0); }

    .item-modal__img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .item-modal__body {
      overflow-y: auto;
      padding: 2rem 2rem 2.5rem;
      position: relative;
    }

    .item-modal__close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 2.2rem;
      height: 2.2rem;
      border: 1px solid rgba(201,168,76,0.3);
      background: rgba(201,168,76,0.08);
      color: var(--cream);
      border-radius: 50%;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, border-color 0.3s;
    }
    .item-modal__close:hover { background: rgba(201,168,76,0.18); border-color: var(--gold); }

    .item-modal__cat {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .item-modal__name {
      font-family: var(--font-head);
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.15;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }

    .item-modal__price {
      font-family: var(--font-head);
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 1.2rem;
    }

    .item-modal__desc {
      font-size: 0.88rem;
      line-height: 1.85;
      color: rgba(245,240,232,0.6);
      margin-bottom: 1.6rem;
    }

    .item-modal__for-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }

    .item-modal__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag-chip {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 2rem;
      padding: 0.35rem 0.9rem;
      font-size: 0.78rem;
      color: rgba(245,240,232,0.75);
    }

    /* ── DESKTOP: modal centered ─────────────────────────────── */
    @media (min-width: 701px) {
      .item-modal {
        align-items: center;
        padding: 2rem;
      }
      .item-modal__inner {
        border-bottom: 1px solid rgba(201,168,76,0.2);
        border-radius: 4px;
        max-height: 86vh;
        transform: translateY(24px) scale(0.96);
      }
      .item-modal.open .item-modal__inner { transform: translateY(0) scale(1); }
      .item-modal__img { height: 320px; }
    }

    /* ── MOBILE responsive ───────────────────────────────────── */
    @media (max-width: 600px) {
      .site-header { padding: 0.9rem 1.4rem; }
      .panels-wrap { padding: 2.5rem 1rem 4rem; }
      .item-row { gap: 1rem; padding: 1.2rem 0.8rem; }
      .item-row:hover { padding-left: 1.2rem; }
      .item-row__img { width: 64px; height: 64px; }
      .item-row__name { font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header__brand">Boğaz Restaurant</div>
  <a href="restaurant.html" class="header__back">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">

    Ana Sayfa

<!-- ── HERO ────────────────────────────────────────────────────── -->
<div class="menu-hero">
  <div class="menu-hero__eyebrow">Boğaz Restaurant</div>
  <h1 class="menu-hero__title">Menümüz</h1>
  <div class="menu-hero__rule"></div>
</div>

<!-- ── STICKY TABS ─────────────────────────────────────────────── -->
<div class="tabs-wrap">
  <div class="tabs-inner" id="menuTabs"></div>
</div>

<!-- ── PANELS ──────────────────────────────────────────────────── -->
<div class="panels-wrap">
  <div id="menuPanels"></div>
</div>

<!-- ── ITEM MODAL ──────────────────────────────────────────────── -->
<div class="item-modal" id="itemModal" role="dialog" aria-modal="true" aria-labelledby="modalName">
  <div class="item-modal__inner">
    <img class="item-modal__img" id="modalImg" src="" alt="">
    <div class="item-modal__body">
      <button class="item-modal__close" id="modalClose" aria-label="Kapat">&#10005;</button>
      <div class="item-modal__cat" id="modalCat"></div>
      <h2 class="item-modal__name" id="modalName"></h2>
      <div class="item-modal__price" id="modalPrice"></div>
      <p class="item-modal__desc" id="modalDesc"></p>
      <div class="item-modal__for-label">Bu yemek kimler için?</div>
      <div class="item-modal__tags" id="modalTags"></div>
    </div>
  </div>
</div>

(function () {

    tavuk: {

        },
        {
          name: 'Çıtır Tavuk', price: '₺265',
          img: 'https://images.unsplash.com/photo-1562967914-608f82629710?w=600&q=80',
          desc: 'Crispy kaplama, bal hardal sos',
          tags: ['🧒 Çocuklar', '🍺 Bira eşliğinde']

        {

      ]
    },
    et: {
      label: 'Et',
      items: [
        {
          name: 'Wagyu Bonfile', price: '₺950',
          img: 'https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=600&q=80',

        {
          name: 'Kuzu Pirzola', price: '₺620',

    tatlilar: {

      items: [
        {
          name: 'Künefe', price: '₺185',
          img: 'https://images.unsplash.com/photo-1579888944880-d98341245702?w=600&q=80',

        },
        {
          name: 'Sütlaç', price: '₺145',
          img: 'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=600&q=80',
          desc: 'Fırın sütlaç, tarçın',

        },
        {

          img: 'https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=600&q=80',

        {
          name: 'Baklava', price: '₺165',
          img: 'https://images.unsplash.com/photo-1519676867240-f03562e64548?w=600&q=80',
          desc: 'Antep fıstıklı, şerbetli',

        }
      ]
    }
  };

  /* ── MODAL ELEMENTS ────────────────────────────────────────── */
  var itemModal  = document.getElementById('itemModal');
  var modalImg   = document.getElementById('modalImg');
  var modalCat   = document.getElementById('modalCat');
  var modalName  = document.getElementById('modalName');
  var modalPrice = document.getElementById('modalPrice');
  var modalDesc  = document.getElementById('modalDesc');
  var modalTags  = document.getElementById('modalTags');
  var modalClose = document.getElementById('modalClose');

  /* ── OPEN / CLOSE MODAL ────────────────────────────────────── */
  function openModal(key, idx) {
    var item = MENU[key].items[idx];
    modalImg.src           = item.img;
    modalImg.alt           = item.name;
    modalCat.textContent   = MENU[key].label;
    modalName.textContent  = item.name;
    modalPrice.textContent = item.price;
    modalDesc.textContent  = item.desc;
    modalTags.innerHTML    = '';
    item.tags.forEach(function (tag) {
      var chip = document.createElement('span');
      chip.className   = 'tag-chip';
      chip.textContent = tag;
      modalTags.appendChild(chip);
    });
    itemModal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    itemModal.classList.remove('open');
    document.body.style.overflow = '';
  }

  modalClose.addEventListener('click', closeModal);
  itemModal.addEventListener('click', function (e) {
    if (e.target === itemModal) closeModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
  });

  /* ── BUILD ROWS ────────────────────────────────────────────── */
  function buildRows(key, cat) {
    var list = document.createElement('div');
    list.className = 'item-list';
    cat.items.forEach(function (item, idx) {
      var row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML =
        '<div class="item-row__info">' +
          '<div class="item-row__name">' + item.name + '</div>' +
          '<div class="item-row__desc">' + item.desc + '</div>' +
        '</div>' +
        '<div class="item-row__right">' +
          '<img class="item-row__img" src="' + item.img + '" alt="' + item.name + '" loading="lazy">' +
          '<div class="item-row__price">' + item.price + '</div>' +
        '</div>';
      row.addEventListener('click', function () { openModal(key, idx); });
      list.appendChild(row);
    });
    return list;
  }

  /* ── BUILD TABS + PANELS ───────────────────────────────────── */
  function buildMenu() {
    var tabsEl   = document.getElementById('menuTabs');
    var panelsEl = document.getElementById('menuPanels');
    var first    = true;

    Object.keys(MENU).forEach(function (key) {
      var cat = MENU[key];

      /* Tab */
      var btn = document.createElement('button');
      btn.className   = 'tab-btn' + (first ? ' active' : '');
      btn.dataset.cat = key;
      btn.textContent = cat.label;
      btn.addEventListener('click', function () { switchCat(key); });
      tabsEl.appendChild(btn);

      /* Panel */
      var panel = document.createElement('div');
      panel.className = 'menu-panel' + (first ? '' : ' hidden');
      panel.id        = 'panel-' + key;
      panel.appendChild(buildRows(key, cat));
      panelsEl.appendChild(panel);

      first = false;
    });
  }

  function switchCat(key) {
    document.querySelectorAll('.tab-btn').forEach(function (t) {
      t.classList.toggle('active', t.dataset.cat === key);
    });
    document.querySelectorAll('.menu-panel').forEach(function (p) {
      p.classList.toggle('hidden', p.id !== 'panel-' + key);
    });
  }

  buildMenu();

}());
</script>
</body>
</html>
